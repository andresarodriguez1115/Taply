  <circle cx="20" cy="20" r="16" stroke="#0a0a0a" stroke-width="2" fill="none" opacity="0.15"/>
  <!-- Middle ring -->
  <circle cx="20" cy="20" r="11" stroke="#2563eb" stroke-width="2" fill="none" opacity="0.45"/>
  <!-- Inner ring -->
  <circle cx="20" cy="20" r="6" stroke="#2563eb" stroke-width="2.2" fill="none" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="2.8" fill="#2563eb"/>
  <!-- Wordmark -->
  <text x="44" y="27" font-family="'Outfit', 'Plus Jakarta Sans', system-ui, sans-serif" font-size="23" font-weight="800" letter-spacing="-1.2" fill="#0a0a0a">taply</text>
</svg>
